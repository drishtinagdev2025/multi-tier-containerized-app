apiVersion: apps/v1
kind: Deployment
metadata:
  name: fastapi-deployment
spec:
  replicas: 2
  selector:
    matchLabels:
      app: fastapi
  template:
    metadata:
      labels:
        app: fastapi
    spec:
      containers:
      - name: fastapi-app
        image: local/fastapi-app:latest
        imagePullPolicy: Never
        ports:
        - containerPort: 8000
        env:
        - name: DB_HOST
          value: postgres-service
        - name: DB_NAME
          value: mydatabase
        - name: DB_USER
          value: dbuser
        - name: DB_PASSWORD
          value: dbpassword
        - name: REDIS_HOST
          value: redis-service
        
        livenessProbe:
          httpGet:
            path: /healthz
            port: 8000
          initialDelaySeconds: 5  # Wait 5 seconds before checking (gives FastAPI time to start)
          periodSeconds: 10       # Check every 10 seconds
          timeoutSeconds: 3       # Consider a timeout a failure after 3 seconds
          failureThreshold: 3     # Restart pod after 3 consecutive failures
          
        readinessProbe:
          httpGet:
            path: /healthz
            port: 8000
          initialDelaySeconds: 5  # Wait before directing traffic to the pod
          periodSeconds: 5        # Check frequently during traffic routing
          timeoutSeconds: 3       
          failureThreshold: 2     # Remove pod from Ingress pool after 2 consecutive failures
---
apiVersion: v1
kind: Service
metadata:
  name: fastapi-service
spec:
  type: ClusterIP  # Changed from NodePort to ClusterIP
  selector:
    app: fastapi
  ports:
    - protocol: TCP
      port: 8000       # The port the Ingress will target
      targetPort: 8000 # The port inside your container